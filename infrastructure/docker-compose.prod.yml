# ─────────────────────────────────────────────────────────────────────────────
# Pyramid Backstage — PRODUCTION stack (VPS).
#
# Runs PREBUILT images pulled from GHCR (ops-core, ai-orchestrator, frontend) plus
# the backing services (Postgres, Redis, ChromaDB) and an edge nginx that
# terminates TLS and routes /api + /ai + the SPA.
#
# Driven by scripts/deploy.sh, which writes .env from CI secrets, runs migrations,
# seeds once, then brings the stack up. NEVER `docker compose up` this by hand on
# the VPS without an .env — every secret reads from the environment, no defaults.
# ─────────────────────────────────────────────────────────────────────────────
services:
  db:
    image: postgres:17
    container_name: pyramid-db-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pyramid}
      POSTGRES_USER: ${POSTGRES_USER:-pyramid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGUSER: ${POSTGRES_USER:-pyramid}
      PGTZ: UTC
    volumes:
      - pyramid_db_data_prod:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${POSTGRES_USER:-pyramid} -d ${POSTGRES_DB:-pyramid}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
      start_interval: 2s
    networks: [pyramid_net]
    restart: always
    shm_size: 256mb
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { memory: 1G }
        reservations: { memory: 256M }

  redis:
    image: redis:7-alpine
    container_name: pyramid-redis-prod
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - pyramid_redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks: [pyramid_net]
    restart: always
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { memory: 256M }
        reservations: { memory: 64M }

  chromadb:
    image: chromadb/chroma:latest
    container_name: pyramid-chromadb-prod
    volumes:
      - pyramid_chroma_data_prod:/chroma/chroma
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks: [pyramid_net]
    restart: always
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { memory: 1G }
        reservations: { memory: 256M }

  ops-core:
    image: ${OPS_CORE_IMAGE:-ghcr.io/elisbushaj/pyramid-backstage/ops-core:latest}
    container_name: pyramid-ops-core-prod
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-pyramid}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pyramid}
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      OPS_CORE_SERVICE_TOKEN: ${OPS_CORE_SERVICE_TOKEN}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/ready', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
      start_interval: 2s
    networks: [pyramid_net]
    restart: always
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }
    deploy:
      resources:
        limits: { memory: 1G }
        reservations: { memory: 256M }

  ai-orchestrator:
    image: ${AI_IMAGE:-ghcr.io/elisbushaj/pyramid-backstage/ai-orchestrator:latest}
    container_name: pyramid-ai-orchestrator-prod
    depends_on:
      ops-core: { condition: service_healthy }
      redis: { condition: service_healthy }
      chromadb: { condition: service_started }
    environment:
      OPS_CORE_URL: http://ops-core:4000/api/v1
      REDIS_URL: redis://redis:6379
      CHROMA_URL: http://chromadb:8000
      OPS_CORE_SERVICE_TOKEN: ${OPS_CORE_SERVICE_TOKEN}
      ACTING_USER_ID: ${ACTING_USER_ID:-c0000000-0000-4000-8000-000000000002}
      ACTING_USER_ROLE: ${ACTING_USER_ROLE:-MANAGER}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MODEL: ${MODEL:-claude-opus-4-8}
      FAST_MODEL: ${FAST_MODEL:-claude-sonnet-4-6}
      CORS_ORIGINS: ${FRONTEND_URL}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status == 200 else 1)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks: [pyramid_net]
    restart: always
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { memory: 1536M }
        reservations: { memory: 512M }

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/elisbushaj/pyramid-backstage/frontend:latest}
    container_name: pyramid-frontend-prod
    environment:
      NGINX_ENTRYPOINT_QUIET_LOGS: "1"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks: [pyramid_net]
    restart: always
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { memory: 128M }
        reservations: { memory: 32M }

  nginx:
    image: nginx:1.29-alpine
    container_name: pyramid-nginx-prod
    depends_on:
      frontend: { condition: service_healthy }
      ops-core: { condition: service_healthy }
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks: [pyramid_net]
    restart: always
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { memory: 128M }
        reservations: { memory: 32M }

  # Container-native TLS renewal: every 12h, renew via webroot then reload nginx.
  # Replaces a host cron job (minimal cloud images ship without `cron`). Talks to
  # the host Docker daemon via the mounted socket — acceptable on a single-tenant
  # VPS; it never touches the nginx service definition, so the proxy stays put.
  certbot-renewer:
    image: docker:cli
    container_name: pyramid-certbot-renewer-prod
    depends_on:
      nginx: { condition: service_started }
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        trap exit TERM
        echo "cert-renewer up — checking every 12h"
        while :; do
          docker run --rm \
            -v /opt/pyramid/certbot/conf:/etc/letsencrypt \
            -v /opt/pyramid/certbot/www:/var/www/certbot \
            certbot/certbot renew --webroot -w /var/www/certbot --quiet || true
          docker exec pyramid-nginx-prod nginx -s reload 2>/dev/null || true
          sleep 12h & wait $!
        done
    restart: always
    networks: [pyramid_net]
    logging:
      driver: json-file
      options: { max-size: "5m", max-file: "2" }

volumes:
  pyramid_db_data_prod: { driver: local }
  pyramid_redis_data_prod: { driver: local }
  pyramid_chroma_data_prod: { driver: local }

networks:
  pyramid_net:
    driver: bridge
