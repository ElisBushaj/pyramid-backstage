# ─────────────────────────────────────────────────────────────────────────────
# Edge routing for pyramidsolvers.xyz
#   /api/  → ops-core:4000   (path preserved → /api/v1/... reaches Express as-is)
#   /ai/   → ai-orchestrator:8000  (/ai/ prefix STRIPPED → /chat, /plan, /health)
#   /      → frontend:8080   (static SPA, history fallback handled in that image)
# ─────────────────────────────────────────────────────────────────────────────

upstream ops_core {
    server ops-core:4000;
    keepalive 32;
}
upstream ai_orchestrator {
    server ai-orchestrator:8000;
    keepalive 32;
}
upstream frontend_app {
    server frontend:8080;
    keepalive 32;
}

# ── Reject unknown hosts / direct IP access (HTTP) ───────────────────────────
server {
    listen 80 default_server;
    server_name _;

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    location / { return 444; }
}

# ── Reject unknown hosts / direct IP access (HTTPS) ──────────────────────────
server {
    listen 443 ssl default_server;
    server_name _;
    ssl_reject_handshake on;
}

# ── HTTP for the domain — ACME challenge + redirect to HTTPS ─────────────────
server {
    listen 80;
    server_name pyramidsolvers.xyz www.pyramidsolvers.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://pyramidsolvers.xyz$request_uri;
    }
}

# ── HTTPS — the application ──────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name pyramidsolvers.xyz;

    ssl_certificate /etc/letsencrypt/live/pyramidsolvers.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pyramidsolvers.xyz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    proxy_hide_header X-Powered-By;

    # ops-core API — path preserved (Express mounts under /api/v1).
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://ops_core;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ai-orchestrator — STRIP the /ai/ prefix (trailing slash on proxy_pass).
    # The SPA calls /ai/chat, /ai/plan → reach FastAPI as /chat, /plan.
    location /ai/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://ai_orchestrator/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        # Claude calls can be slow — give the reasoning layer room.
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Everything else → the static SPA.
    location / {
        limit_req zone=general_limit burst=50 nodelay;

        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ── HTTPS www → apex redirect ────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name www.pyramidsolvers.xyz;

    ssl_certificate /etc/letsencrypt/live/pyramidsolvers.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pyramidsolvers.xyz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://pyramidsolvers.xyz$request_uri;
}
