# Pyramid Backstage CI.
#
# Three independent jobs:
#   ops-core       — Node 20, install, generate Prisma client, `tsc --noEmit`.
#   frontend       — Node 20, install, `tsc -b`, production build.
#   ops-core-tests — Postgres 17 + Redis service containers; runs Prisma
#                    migrations then the FULL ops-core Vitest suite against a
#                    real database (no DB mocks — see CLAUDE.md). The suite is
#                    DB-backed throughout, so it needs the services to run at all.
#
# Test env is hardcoded below (no secrets) — everything points at the
# service-container ports GitHub Actions exposes on the runner's localhost.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  ops-core:
    name: ops-core — typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ops-core/package-lock.json

      - name: Install deps
        working-directory: ops-core
        run: npm ci

      - name: Generate Prisma client
        working-directory: ops-core
        # Prisma 7 resolves DATABASE_URL eagerly from prisma.config.ts at generate
        # time. No DB is contacted — a dummy URL just satisfies the config loader.
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
        run: npx prisma generate

      - name: Typecheck
        working-directory: ops-core
        run: npx tsc --noEmit

  frontend:
    name: frontend — typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: frontend
        run: pnpm exec tsc -b

      - name: Build
        working-directory: frontend
        run: pnpm build

  ops-core-tests:
    name: ops-core — tests (real Postgres + Redis)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://pyramid:pyramid@localhost:5432/pyramid_test"
      REDIS_URL: "redis://localhost:6379"
      SESSION_SECRET: "ci-session-secret"
      FRONTEND_URL: "http://localhost:5173"
      PORT: "4000"
      NODE_ENV: "test"
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: pyramid_test
          POSTGRES_USER: pyramid
          POSTGRES_PASSWORD: pyramid
          PGTZ: UTC
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pyramid -d pyramid_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ops-core/package-lock.json

      - name: Install deps
        working-directory: ops-core
        run: npm ci

      - name: Apply Prisma migrations
        working-directory: ops-core
        run: npx prisma migrate deploy

      - name: Generate Prisma client
        working-directory: ops-core
        run: npx prisma generate

      - name: Run test suite
        working-directory: ops-core
        run: npx vitest run
