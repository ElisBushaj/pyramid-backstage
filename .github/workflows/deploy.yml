name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys overlap; queue instead of cancel (a half-applied deploy is worse).
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OPS_CORE_IMAGE: ghcr.io/elisbushaj/pyramid-backstage/ops-core
  AI_IMAGE: ghcr.io/elisbushaj/pyramid-backstage/ai-orchestrator
  FRONTEND_IMAGE: ghcr.io/elisbushaj/pyramid-backstage/frontend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Validate required secrets
        run: |
          missing=""
          for pair in \
            "VPS_HOST=${{ secrets.VPS_HOST }}" \
            "VPS_SSH_KEY=${{ secrets.VPS_SSH_KEY }}" \
            "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
            "SESSION_SECRET=${{ secrets.SESSION_SECRET }}" \
            "OPS_CORE_SERVICE_TOKEN=${{ secrets.OPS_CORE_SERVICE_TOKEN }}" \
            "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
            "LETSENCRYPT_EMAIL=${{ secrets.LETSENCRYPT_EMAIL }}"; do
            name="${pair%%=*}"; val="${pair#*=}"
            if [ -z "$val" ]; then missing="$missing $name"; fi
          done
          if [ -n "$missing" ]; then echo "::error::Missing secrets:$missing"; exit 1; fi

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ops-core
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ops-core/Dockerfile
          push: true
          tags: ${{ env.OPS_CORE_IMAGE }}:latest,${{ env.OPS_CORE_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=ops-core
          cache-to: type=gha,mode=max,scope=ops-core

      - name: Build & push ai-orchestrator
        uses: docker/build-push-action@v6
        with:
          context: ./ai-orchestrator
          file: ./ai-orchestrator/Dockerfile
          push: true
          tags: ${{ env.AI_IMAGE }}:latest,${{ env.AI_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=ai
          cache-to: type=gha,mode=max,scope=ai

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest,${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_OPS_CORE_URL=/api/v1
            VITE_AI_URL=/ai
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Copy infra files to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "infrastructure/docker-compose.prod.yml,infrastructure/nginx,infrastructure/db,infrastructure/scripts/deploy.sh"
          target: "/opt/pyramid"
          strip_components: 1

      - name: Run deploy on VPS
        uses: appleboy/ssh-action@v1
        env:
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          OPS_CORE_SERVICE_TOKEN: ${{ secrets.OPS_CORE_SERVICE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: POSTGRES_PASSWORD,SESSION_SECRET,OPS_CORE_SERVICE_TOKEN,ANTHROPIC_API_KEY,LETSENCRYPT_EMAIL,GHCR_TOKEN,GH_ACTOR
          command_timeout: 20m
          script: |
            set -e
            cd /opt/pyramid
            cat > .env <<ENVEOF
            POSTGRES_DB=pyramid
            POSTGRES_USER=pyramid
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            SESSION_SECRET=${SESSION_SECRET}
            OPS_CORE_SERVICE_TOKEN=${OPS_CORE_SERVICE_TOKEN}
            ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
            LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
            FRONTEND_URL=https://pyramidsolvers.xyz
            MODEL=claude-opus-4-8
            FAST_MODEL=claude-sonnet-4-6
            ACTING_USER_ID=c0000000-0000-4000-8000-000000000002
            ACTING_USER_ROLE=MANAGER
            ENVEOF
            chmod 600 .env
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GH_ACTOR}" --password-stdin
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
