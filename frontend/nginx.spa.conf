# Static SPA server for the built Vite bundle. Sits BEHIND the edge nginx, so no
# TLS / no security headers here (the edge owns those). Just serve files, fall
# back to index.html for client-side routes, and cache hashed assets hard.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Internal health probe for the edge nginx / compose healthcheck.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Vite emits content-hashed filenames under /assets — safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA history fallback: unknown paths render index.html (React Router owns routing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached, or clients pin a stale bundle after deploys.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
